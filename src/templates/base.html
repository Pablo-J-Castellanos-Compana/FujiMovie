<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FujiMovie - Películas{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #ec4899;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 2px solid var(--primary-color);
        }
        .navbar-brand {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
            font-size: 1.8rem;
        }
        .nav-link {
            color: #e2e8f0 !important;
        }
        .nav-link:hover {
            color: var(--primary-color) !important;
        }
        .page-title {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .movie-card {
            background: #1e293b;
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .movie-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-color);
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3);
        }
        .movie-image {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            overflow: hidden;
            border-radius: 15px 15px 0 0;
        }
        .movie-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .btn-primary {
            background: var(--primary-color);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        }
        
        /* Estilos para valoración */
        .rating-section {
            background: rgba(99, 102, 241, 0.1);
            padding: 25px;
            border-radius: 15px;
            border-left: 4px solid var(--primary-color);
        }
        
        .star-rating-fancy {
            display: flex;
            gap: 15px;
            flex-direction: row-reverse;
            justify-content: flex-end;
        }
        
        .star-rating-fancy input {
            display: none;
        }
        
        .star-label {
            font-size: 3rem;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
            filter: drop-shadow(0 0 0px rgba(236, 72, 153, 0));
        }
        
        .star-label:hover,
        .star-label:hover ~ .star-label {
            color: #f59e0b;
            filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.6));
            transform: scale(1.2);
        }
        
        .star-rating-fancy input:checked ~ .star-label {
            color: #f59e0b;
            filter: drop-shadow(0 0 12px rgba(245, 158, 11, 0.9));
            animation: starPulse 0.3s ease-out;
        }
        
        @keyframes starPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1.3); }
        }
        
        .ratings-list {
            background: rgba(99, 102, 241, 0.05);
            padding: 20px;
            border-radius: 15px;
        }
        
        .rating-item {
            background: #1e293b;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #f59e0b;
            transition: all 0.3s ease;
            animation: slideInRating 0.4s ease-out;
        }
        
        .rating-item:hover {
            transform: translateX(5px);
            background: #293548;
        }
        
        @keyframes slideInRating {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        /* Explosión */
        .explosion-container {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 2000;
        }
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            display: inline-block;
            animation: confetti-fall 3s ease-out forwards;
        }
        
        @keyframes confetti-fall {
            to {
                transform: translate(var(--tx), var(--ty)) rotate(720deg);
                opacity: 0;
            }
        }
        
        .firework {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: firework-burst 0.8s ease-out forwards;
        }
        
        @keyframes firework-burst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }
        
        .pulse-ring {
            position: fixed;
            pointer-events: none;
            animation: pulse-ring-animation 0.6s ease-out forwards;
        }
        
        @keyframes pulse-ring-animation {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/movies">
                <i class="fas fa-film"></i> FujiMovie
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/movies">
                    <i class="fas fa-clapperboard"></i> Catálogo
                </a>
                {% if session.get('user_id') %}
                <a class="nav-link" href="/library">
                    <i class="fas fa-bookmark"></i> Mi Biblioteca
                </a>
                <span class="nav-link" style="color: #cbd5e1;">
                    <i class="fas fa-user"></i> {{ session.get('username') }}
                </span>
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </a>
                {% else %}
                <a class="nav-link" href="/login">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </a>
                <a class="nav-link" href="/register">
                    <i class="fas fa-user-plus"></i> Registrarse
                </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
