{% extends "base.html" %}

{% block title %}Error {{ error_code }} - FujiMovie{% endblock %}

{% block content %}
<div class="text-center py-5">
    <div class="display-1" style="color: var(--primary-color);">{{ error_code }}</div>
    <h2>{{ message }}</h2>
    <p class="text-muted">Parece que algo salió mal</p>
    <a href="/movies" class="btn btn-primary mt-3">
        <i class="fas fa-home"></i> Volver al inicio
    </a>
</div>
{% endblock %}
